<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>빅데이터 분석기사 기출문제 학습장</title>
    <style>
        :root {
            --primary: #4F46E5;
            --bg-color: #F9FAFB;
            --border-color: #E5E7EB;
            --text-main: #111827;
            --text-muted: #6B7280;
        }
        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0; padding: 20px;
        }
        .container {
            max-width: 1200px; margin: 0 auto; background: white;
            padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }
        h1 { text-align: center; color: var(--primary); margin-bottom: 20px; }
        
        .tabs { display: flex; border-bottom: 2px solid var(--border-color); margin-bottom: 20px; }
        .tab-btn { padding: 12px 24px; cursor: pointer; border: none; background: none; font-size: 16px; font-weight: bold; color: var(--text-muted); border-bottom: 3px solid transparent; margin-bottom: -2px; transition: 0.2s; }
        .tab-btn:hover { color: var(--primary); }
        .tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); }
        .tab-content { display: none; animation: fadeIn 0.3s; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .stat-card { background: #F3F4F6; padding: 20px; border-radius: 8px; text-align: center; }
        .stat-card h3 { margin: 0 0 10px 0; font-size: 14px; color: var(--text-muted); }
        .stat-card .value { font-size: 32px; font-weight: bold; margin-bottom: 5px; }

        .filters { display: flex; gap: 10px; flex-wrap: wrap; background: #F3F4F6; padding: 15px; border-radius: 8px; margin-bottom: 20px; align-items: center; }
        select, input[type="text"] { padding: 8px 10px; border: 1px solid var(--border-color); border-radius: 6px; font-size: 14px; outline: none; }
        select:focus, input[type="text"]:focus { border-color: var(--primary); }
        /* 주제 필터는 내용이 길 수 있어서 너비를 살짝 넓게 조정 */
        #filter-topic { max-width: 250px; text-overflow: ellipsis; }
        .checkbox-label { display: flex; align-items: center; gap: 6px; cursor: pointer; font-weight: bold; color: var(--primary); font-size: 14px;}
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 14px; }
        th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid var(--border-color); }
        th { background-color: #F9FAFB; font-weight: 600; color: var(--text-muted); }
        tr:hover { background-color: #F3F4F6; }
        
        .btn-star { cursor: pointer; font-size: 20px; color: #D1D5DB; background: none; border: none; padding: 0; }
        .btn-star.active { color: #FBBF24; }
        .status-btns { display: flex; gap: 5px; }
        .btn-status { padding: 4px 10px; border: 1px solid var(--border-color); background: white; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: bold; transition: 0.1s; }
        .btn-status.correct.active { background: #10B981; color: white; border-color: #10B981; }
        .btn-status.wrong.active { background: #EF4444; color: white; border-color: #EF4444; }
        
        .badge { padding: 4px 8px; border-radius: 12px; font-size: 12px; font-weight: bold; color: white; }
        .diff-상 { background-color: #EF4444; } .diff-중 { background-color: #F59E0B; } .diff-하 { background-color: #10B981; }
    </style>
</head>

<div class="container">
    <h1>📝 빅데이터 분석기사 학습 관리장</h1>

    <div class="tabs">

                </select>

            <select id="filter-status">

            <span style="margin-left: auto; font-size: 14px; color: var(--text-muted); font-weight: bold;" id="result-count">총 0문제</span>

        <table>

            <tbody id="table-body"></tbody>

    </div>

    <div id="tab-stats" class="tab-content">

            </div>
            <div class="stat-card">

                <div style="font-size: 13px; color: var(--text-muted);">푼 문제 기준</div>
            </div>
            <div class="stat-card">

</div>

    // 👆👆👆 👆👆👆


    function csvToJson(csv) {
        const lines = csv.trim().split('\n');
        if (lines.length <= 1) return []; 
        const headers = lines[0].split(',').map(h => h.trim());
        const result = [];
        for (let i = 1; i < lines.length; i++) {
            if (!lines[i].trim()) continue;
            const currentLine = lines[i].split(',');
            const obj = {};
            for (let j = 0; j < headers.length; j++) {
                let key = headers[j];
                let value = currentLine[j] ? currentLine[j].trim() : "";
                if (key === 'session' || key === 'question_no') value = parseInt(value, 10);
                obj[key] = value;
            }
            result.push(obj);
        }
        return result;
    }

    let questionData = csvToJson(rawCSV);
    questionData.forEach(item => { item.id = `${item.session}-${item.question_no}`; });

    let bookmarks = JSON.parse(localStorage.getItem('bookmarks')) || [];
    let statuses = JSON.parse(localStorage.getItem('statuses')) || {}; 

    const tbody = document.getElementById('table-body');
    const resultCount = document.getElementById('result-count');
    
    const filterKeyword = document.getElementById('filter-keyword');
    const filterSubject = document.getElementById('filter-subject');
    const filterTopic = document.getElementById('filter-topic'); // 추가된 주제 필터
    const filterDifficulty = document.getElementById('filter-difficulty');
    const filterStatus = document.getElementById('filter-status');
    const filterBookmark = document.getElementById('filter-bookmark');

    // 🌟 주제 필터 옵션을 생성하는 함수 (선택된 과목에 따라 유동적으로 변함)
    function updateTopicOptions() {
        const selectedSubject = filterSubject.value;
        let topics = new Set();
        
        questionData.forEach(item => {
            if (!selectedSubject || item.subject === selectedSubject) {
                topics.add(item.topic);
            }
        });

        filterTopic.innerHTML = '<option value="">모든 주제</option>';
        
        // 가나다 순 정렬 후 옵션 추가
        [...topics].sort().forEach(topic => {
            const option = document.createElement('option');
            option.value = topic;
            option.textContent = topic;
            filterTopic.appendChild(option);
        });
    }

    function renderTable() {
        const keywordVal = filterKeyword.value.toLowerCase().trim();
        const subjectVal = filterSubject.value;
        const topicVal = filterTopic.value; // 추가된 주제 조건
        const diffVal = filterDifficulty.value;
        const statusVal = filterStatus.value;
        const onlyBookmarked = filterBookmark.checked;

        const filteredData = questionData.filter(item => {
            const isBookmarked = bookmarks.includes(item.id);
            const itemStatus = statuses[item.id] || "none";

            if (keywordVal && !item.topic.toLowerCase().includes(keywordVal) && !item.category.toLowerCase().includes(keywordVal)) return false;
            if (subjectVal && item.subject !== subjectVal) return false;
            if (topicVal && item.topic !== topicVal) return false; // 주제 필터 적용
            if (diffVal && item.difficulty !== diffVal) return false;
            if (statusVal && itemStatus !== statusVal) return false;
            if (onlyBookmarked && !isBookmarked) return false;
            return true;
        });

        resultCount.textContent = `총 ${filteredData.length}문제`;
        tbody.innerHTML = '';

        if (filteredData.length === 0) {
            tbody.innerHTML = `<tr><td colspan="7" style="text-align:center; padding: 30px; color: gray;">조건에 맞는 문제가 없습니다.</td></tr>`;
            return;
        }

        filteredData.forEach(item => {
            const isBookmarked = bookmarks.includes(item.id);
            const itemStatus = statuses[item.id];
            const shortSubject = item.subject.split(': ')[1] || item.subject;

            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td style="text-align:center;">
                    <button class="btn-star ${isBookmarked ? 'active' : ''}" onclick="toggleBookmark('${item.id}')">${isBookmarked ? '★' : '☆'}</button>
                </td>
                <td style="font-weight: 600; color: #4B5563;">${shortSubject}</td>
                <td style="color: #6B7280; font-size: 12px;">${item.category}</td>
                <td>${item.topic}</td>
                <td><strong>${item.session}회</strong> ${item.question_no}번</td>
                <td><span class="badge diff-${item.difficulty}">${item.difficulty}</span></td>
                <td>
                    <div class="status-btns">
                        <button class="btn-status correct ${itemStatus === 'correct' ? 'active' : ''}" onclick="setStatus('${item.id}', 'correct')">O</button>
                        <button class="btn-status wrong ${itemStatus === 'wrong' ? 'active' : ''}" onclick="setStatus('${item.id}', 'wrong')">X</button>
                    </div>
                </td>
            `;
            tbody.appendChild(tr);
        });
    }

    function renderStats() {
        const total = questionData.length;
        if (total === 0) return; 

        let solvedCount = 0; let correctCount = 0; let wrongCount = 0;

        Object.values(statuses).forEach(status => {
            if (status === 'correct') { correctCount++; solvedCount++; }
            if (status === 'wrong') { wrongCount++; solvedCount++; }
        });

        const progressRate = Math.round((solvedCount / total) * 100) || 0;
        const correctRate = solvedCount > 0 ? Math.round((correctCount / solvedCount) * 100) : 0;

        document.getElementById('stat-progress').textContent = `${progressRate}%`;
        document.getElementById('stat-progress-text').textContent = `${solvedCount} / ${total} 문제 풀이 완료`;
        document.getElementById('stat-correct-rate').textContent = `${correctRate}%`;
        document.getElementById('stat-bookmark').textContent = `${bookmarks.length}개`;
        document.getElementById('stat-wrong').textContent = `${wrongCount}개`;

        const subjects = ["1과목: 빅데이터 분석 기획", "2과목: 빅데이터 탐색", "3과목: 빅데이터 모델링", "4과목: 빅데이터 결과 해석"];
        const subjectStatsDiv = document.getElementById('subject-stats');
        subjectStatsDiv.innerHTML = '';

        subjects.forEach(subj => {
            const subjQuestions = questionData.filter(q => q.subject === subj);
            let sSolved = 0, sCorrect = 0;

            subjQuestions.forEach(q => {
                if (statuses[q.id] === 'correct') { sCorrect++; sSolved++; }
                if (statuses[q.id] === 'wrong') { sSolved++; }
            });

            const sRate = sSolved > 0 ? Math.round((sCorrect / sSolved) * 100) : 0;
            const color = sRate >= 80 ? '#10B981' : (sRate >= 50 ? '#F59E0B' : '#EF4444'); 

            subjectStatsDiv.innerHTML += `
                <div class="stat-card">
                    <h3>${subj.split(': ')[1] || subj}</h3>
                    <div class="value" style="color: ${sSolved > 0 ? color : '#9CA3AF'};">${sSolved > 0 ? sRate + '%' : '-'}</div>
                    <div style="font-size: 13px; color: var(--text-muted);">${sCorrect} / ${sSolved} 정답</div>
                </div>
            `;
        });
    }

    window.switchTab = function(tabName) {
        document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
        document.getElementById('tab-' + tabName).classList.add('active');
        document.querySelector(`.tab-btn[onclick*="${tabName}"]`).classList.add('active');
        if (tabName === 'stats') renderStats();
    };

    window.toggleBookmark = function(id) {
        if (bookmarks.includes(id)) bookmarks = bookmarks.filter(b => b !== id);
        else bookmarks.push(id);
        localStorage.setItem('bookmarks', JSON.stringify(bookmarks));
        renderTable();
    };

    window.setStatus = function(id, status) {
        if (statuses[id] === status) delete statuses[id];
        else statuses[id] = status;
        localStorage.setItem('statuses', JSON.stringify(statuses));
        renderTable();
    };

    // 🌟 이벤트 리스너: 과목을 변경하면 주제 옵션을 새로 고침
    filterSubject.addEventListener('change', () => {
        updateTopicOptions(); 
        // 과목이 바뀌면 선택되어 있던 주제를 초기화
        filterTopic.value = ""; 
        renderTable();
    });
    
    filterKeyword.addEventListener('input', renderTable);
    filterTopic.addEventListener('change', renderTable); // 주제 변경 리스너
    filterDifficulty.addEventListener('change', renderTable);
    filterStatus.addEventListener('change', renderTable);
    filterBookmark.addEventListener('change', renderTable);

    // 초기화 실행
    updateTopicOptions(); // 최초에 모든 주제 목록 세팅
    renderTable();
</script>

</body>
</html>
